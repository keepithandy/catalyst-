name: Bootstrap Catalyst source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Expand validated source
        run: |
          unzip -o .bootstrap/app.zip -d .
          unzip -o .bootstrap/styles.zip -d .
          sed -i 's#keepithandy/catalyst#keepithandy/catalyst-#g; s#Repository = "catalyst"#Repository = "catalyst-"#' README.md publish-to-github.ps1
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit prototype baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: publish Catalyst v0.1.0 prototype"
          git push
